# ---------------------------------------------------------
# Driftcut demo — Replay config for migration-mini
#
# Reproduces the gpt-4o vs gpt-4o-mini STOP decision from
# the captured replay-mini.json without spending any API
# credits or requiring an API key.
#
# Run with:
#   driftcut replay --config examples/demo/replay-mini.yaml \
#     --input examples/demo/replay-mini.json
#
# Note: judge_strategy is "none" so this is reproducible
# without keys. The STOP decision is driven by deterministic
# checks alone (high-crit failure rate >= 20%).
# ---------------------------------------------------------

name: "Replay: GPT-4o to GPT-4o-mini cost reduction"
description: "Replay of the live migration-mini run; reproduces the STOP decision from deterministic checks alone."

models:
  baseline:
    provider: openrouter
    model: openai/gpt-4o
  candidate:
    provider: openrouter
    model: openai/gpt-4o-mini

sampling:
  batch_size_per_category: 3
  max_batches: 5
  min_batches: 1

risk:
  high_criticality_weight: 2.0
  stop_on_schema_break_rate: 0.25
  stop_on_high_criticality_failure_rate: 0.20
  proceed_if_overall_risk_below: 0.08

evaluation:
  judge_strategy: none
  judge_model_light: openrouter/openai/gpt-4.1-mini
  judge_model_heavy: openrouter/openai/gpt-4.1
  detect_failure_archetypes: true

latency:
  track: true
  regression_threshold_p50: 1.5
  regression_threshold_p95: 2.0

output:
  save_json: true
  save_html: true
  save_examples: true
  show_thresholds: true
  show_confidence: true
