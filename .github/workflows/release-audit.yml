name: Release Audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: python scripts/check_release_alignment.py

      - run: python scripts/check_release_state.py --retries 6 --delay-seconds 10
